<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>

        *{
            margin: 0;
            box-sizing: border-box;
        }


        /*CSS Flexbox base (pai)*/
        .container{
            display: flex;
            background-color: black;
            flex-direction: column;
        }
        

        .container div{
            background-color: rgb(192, 0, 0);
            margin: 10px;
            font-size: 18px;
            padding: 10px;
            border-radius: 15px;
            color:aliceblue;
            }
            .container .div1{
            background-color: blue;
            color: rgb(0, 0, 0);
            padding: 10px;
            flex: 1;
        }
        .container .div2{
            background-color: aqua;
            color: black;
            padding: 10px;
        }
        .container .div3{
            background-color: beige;
            color: black;
            padding: 10px;
        }
        .container .div4{
            background-color: brown;
            color:black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <!--Container Pai-->
    <div class="container">
        <div class="div1">1</div>

        <div class="div2">2</div>

        <div class="div3">3</div>
        
        <div class="div4">4</div>
    </div>
   
</body>


</html>
